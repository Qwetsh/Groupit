# Workflow pour déployer Groupit + PWA Jury sur GitHub Pages
name: Deploy to GitHub Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Build Groupit (app principale)
      - name: Install dependencies (root)
        run: npm ci

      - name: Build Groupit
        run: npm run build

      # Build shared package
      - name: Install dependencies (shared)
        run: cd packages/shared && npm ci

      # Build PWA Jury
      - name: Install dependencies (jury)
        run: cd apps/jury && npm ci

      - name: Build PWA Jury
        run: cd apps/jury && npm run build

      # Build Dashboard
      - name: Install dependencies (dashboard)
        run: cd apps/dashboard && npm ci

      - name: Build Dashboard
        run: cd apps/dashboard && npm run build

      # Combiner les builds
      - name: Combine builds
        run: |
          cp -r apps/jury/dist ./dist/groupit-jury
          cp -r apps/dashboard/dist ./dist/groupit-dashboard

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
